<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Calculadora</title>
</head>

<body>

    <header id="titulo">
        <h1>Calculadora Simples</h1>
    </header>

    
        <div class="calculadora"> 

            <h1> Calculadora</h1>
               <p id= resultado> 0 </p>

                <table> 
                    <tr>
                   <td> <button class="botao" onclick="apagar()" > CE</button> </td>
                   <td> <button class="botao" onclick="limpar()"> C</button> </td>
                   <td>  <button class="botao" onclick="apagar()"> DEL </button> </td>
                   <td> <button class="botao" onclick="clique('/')"> / </button> </td>
                    </tr>

                <tr>
                   <td> <button class="botao"  onclick="clique('7')" >7</button> </td>
                    <td> <button class="botao" onclick="clique('8')" >8</button> </td>
                  <td>  <button class="botao"  onclick="clique('9')">9</button> </td>
                   <td> <button class="botao" onclick="clique ('*')"> * </button> </td>
            
                </tr>

                <tr>
                  <td>   <button class="botao" onclick="clique('4')" >4</button> </td>
                  <td>   <button class="botao" onclick="clique('5')">5</button> </td> 
                  <td>   <button class="botao" onclick="clique('6')" >6</button> </td> 
                  <td>   <button class="botao" onclick="clique('-')"> - </button> </td> 
                </tr>
                    
                <tr> 
                   <td>  <button class="botao" onclick="clique('1')" >1</button> </td> 
                 <td>    <button class="botao" onclick="clique('2')">2</button> </td> 
                 <td>    <button class="botao" onclick="clique('3')">3</button> </td>
                   <td>  <button class="botao" onclick="clique('+')"> + </button> </td>
                </tr>
                 
                    <tr> 
                  <td>   <button class="botao" onclick="clique('+/-')" >+/-</button> </td> 
                   <td>  <button class="botao" onclick="clique('0')" >0</button> </td> 
                   <td>  <button class="botao" onclick="clique(',')" >,</button> </td>
                   <td>  <button class="botao" onclick="calcular()('=')" > = </button> </td>
                    </tr>
                </div>
</table>
      
 

</body>

<script src="script.js"> </script>

</html>
