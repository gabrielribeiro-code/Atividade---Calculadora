<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Calculadora</title>
</head>

<body>

    <header id="titulo">
        <h1>Calculadora Simples</h1>
    </header>

    
        <div class="calculadora"> 

            <h1> Calculadora</h1>
               
            <div> 

                <input type="number" id="n1">
                <input type="number" id="n2">

            </div>
           
            <div>
    <div class="botoes">
                <button class="botao cor" onclick= "soma()" > + </button>
                <button class="botao cor" onclick= "subtracao()" > - </button>
                 <button class="botao cor" onclick= "multiplicacao()" > * </button>
                <button class="botao cor" onclick= "divisao()" > / </button>
                 <button class="botao cor" onclick= "limpar()" > C </button>
                </div>
            </div>
            <p> Resultado: <span id="tela_resultado"> </span> </p>
        </div>
            
            
</body>

<script src="script.js"> </script>

</html>
